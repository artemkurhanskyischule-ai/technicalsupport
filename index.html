<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e1f22;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:650px;
    background:#2b2d31;
    border-radius:14px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#5865F2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.subtitle{
    margin-top:5px;
    color:#b5bac1;
}

/* LANG */
.lang{
    display:flex;
    align-items:center;
    gap:8px;
    position:relative;
}

.lang button{
    background:#3f4147;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.lang-menu{
    display:none;
    position:absolute;
    right:0;
    top:40px;
    background:#2b2d31;
    border:1px solid #3f4147;
    border-radius:8px;
    min-width:140px;
}

.lang-menu div{
    padding:10px;
    cursor:pointer;
}

.lang-menu div:hover{
    background:#3f4147;
}

.form{
    margin-top:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#b5bac1;
    font-size:14px;
}

input,
textarea{
    width:100%;
    background:#1e1f22;
    border:1px solid #3f4147;
    border-radius:8px;
    padding:12px;
    color:white;
}

textarea{
    height:120px;
    resize:none;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    cursor:pointer;
}

.primary{
    width:100%;
    background:#5865F2;
    color:white;
}

.primary:hover{
    background:#4752c4;
}

.success{
    margin-top:20px;
    background:#2f3136;
    border-left:4px solid #57f287;
    padding:15px;
    border-radius:10px;
    display:none;
}

</style>
</head>

<body>

<div class="card">

    <div class="header">

        <div class="left">

            <div class="avatar">🎧</div>

            <div>
                <div class="title" id="title"></div>
                <div class="subtitle" id="subtitle"></div>
            </div>

        </div>

        <div class="lang">

            <div style="font-size:12px;color:#b5bac1;margin-right:6px;">
                Language
            </div>

            <button onclick="toggleLang()">🌐</button>

            <div class="lang-menu" id="langMenu">
                <div onclick="setLang('de')">Deutsch</div>
                <div onclick="setLang('ru')">Русский</div>
            </div>

        </div>

    </div>

    <div class="form">

        <div class="input-group">
            <label id="l1"></label>
            <input id="username">
        </div>

        <div class="input-group">
            <label id="l2"></label>
            <input id="contact">
        </div>

        <div class="input-group">
            <label id="l3"></label>
            <textarea id="problem"></textarea>
        </div>

        <button class="primary" onclick="createTicket()" id="btn"></button>

    </div>

    <div class="success" id="success">
        <h3 id="st"></h3>
        <p id="st2"></p>
        <div id="st3"></div>
    </div>

    <!-- CLOSE BUTTON -->
    <button id="closeBtn" class="primary"
    style="margin-top:15px;display:none;background:#da373c;"
    onclick="closeTicket()">
        Close Ticket
    </button>

</div>

<script>

const webhookURL = "https://discord.com/api/webhooks/1503900719684784198/gb6_N8DrwRvCkBXmZpIBED2f3JlyTvdx9m34fRSSxrDOTxat8Mb8w2Py031Uej7_NJ9n";

let lang = "de";
let ticket = null;

const t = {

de:{
    title:"Technischer Support",
    subtitle:"Formular ausfüllen",
    l1:"Benutzername:",
    l2:"Kontakt Daten (Telegram/ Discord/ Email):",
    l3:"Beschreiben sie ihre Problem:",
    btn:"Ticket erstellen",
    success:"Ticket gesendet",
    success2:"Ihr Ticket wurde an gesendet Technischer Support"
},

ru:{
    title:"Техническая поддержка",
    subtitle:"Заполните форму",
    l1:"Имя пользователя",
    l2:"Контактные данные (Telegram/ Discord/ Email):",
    l3:"Опишите вашу проблему:",
    btn:"Создать тикет",
    success:"Обращение отправлено",
    success2:"Ваш тикет отправлен тех.поддержке"
}
};

function toggleLang(){
    let m = document.getElementById("langMenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

function setLang(l){
    lang = l;
    document.getElementById("langMenu").style.display = "none";
    render();
}

function render(){

    let x = t[lang];

    document.getElementById("title").innerText = x.title;
    document.getElementById("subtitle").innerText = x.subtitle;

    document.getElementById("l1").innerText = x.l1;
    document.getElementById("l2").innerText = x.l2;
    document.getElementById("l3").innerText = x.l3;

    document.getElementById("btn").innerText = x.btn;
}

render();

async function createTicket(){

    let username = document.getElementById("username").value;
    let contact = document.getElementById("contact").value;
    let problem = document.getElementById("problem").value;

    if(!username || !contact || !problem) return;

    ticket = Math.floor(Math.random()*90000)+10000;

    await fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[{
                title: lang === "de"
                ? "✉️ Neues Support-Ticket"
                : "✉️ Новое обращение",

                fields:[
                    {
                        name: lang === "de"
                        ? "🆔 Ticketnummer"
                        : "🆔 Номер тикета",
                        value:"🎟️ #"+ticket
                    },
                    {
                        name: lang === "de"
                        ? "👤 Benutzername"
                        : "👤 Имя пользователя",
                        value:username
                    },
                    {
                        name: lang === "de"
                        ? "📞 Kontakt Daten"
                        : "📞 Контактные данные",
                        value:contact
                    },
                    {
                        name: lang === "de"
                        ? "📝 Problem"
                        : "📝 Проблема",
                        value:problem
                    }
                ],

                footer:{text:"Support System"},
                timestamp:new Date()
            }]
        })
    });

    document.getElementById("success").style.display="block";

    document.getElementById("st").innerText = t[lang].success;
    document.getElementById("st2").innerText = t[lang].success2;
    document.getElementById("st3").innerText = "🎟️ #" + ticket;

    document.getElementById("closeBtn").style.display = "block";
}

async function closeTicket(){

    let username = document.getElementById("username").value;

    await fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[{
                title:"❌ Ticket Closed",

                fields:[
                    {
                        name:"🎟️ Ticket",
                        value:"#"+ticket
                    },
                    {
                        name:"👤 User",
                        value:username
                    }
                ],

                description:"User closed the ticket",
                color:15158332,
                timestamp:new Date()
            }]
        })
    });

    document.getElementById("closeBtn").style.display = "none";
}

</script>

</body>
</html>

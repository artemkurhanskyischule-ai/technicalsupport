<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e1f22;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:650px;
    background:#2b2d31;
    border-radius:14px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#5865F2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.subtitle{
    margin-top:5px;
    color:#b5bac1;
}

/* LANGUAGE */
.lang{
    display:flex;
    align-items:center;
    gap:8px;
    position:relative;
}

.lang-label{
    color:#b5bac1;
    font-size:13px;
}

.lang button{
    background:#3f4147;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.lang-menu{
    display:none;
    position:absolute;
    right:0;
    top:40px;
    background:#2b2d31;
    border:1px solid #3f4147;
    border-radius:8px;
    overflow:hidden;
    min-width:150px;
    z-index:10;
}

.lang-menu div{
    padding:10px;
    cursor:pointer;
}

.lang-menu div:hover{
    background:#3f4147;
}

.form{
    margin-top:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#b5bac1;
    font-size:14px;
}

input,
textarea{
    width:100%;
    background:#1e1f22;
    border:1px solid #3f4147;
    border-radius:8px;
    padding:12px;
    color:white;
    font-size:14px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    cursor:pointer;
    font-size:14px;
}

.primary{
    width:100%;
    background:#5865F2;
    color:white;
}

.primary:hover{
    background:#4752c4;
}

.ticket{
    margin-top:25px;
    background:#313338;
    border-radius:10px;
    padding:20px;
    display:none;
    border-left:4px solid #5865F2;
}

.close-btn{
    margin-top:15px;
    width:100%;
    background:#da373c;
    color:white;
}

.close-btn:hover{
    background:#b52d31;
}

</style>
</head>

<body>

<div class="card">

    <div class="header">

        <div class="left">

            <div class="avatar">🎧</div>

            <div>

                <div class="title" id="title"></div>
                <div class="subtitle" id="subtitle"></div>

            </div>

        </div>

        <div class="lang">

            <div class="lang-label" id="langLabel"></div>

            <button onclick="toggleLangMenu()">🌐</button>

            <div class="lang-menu" id="langMenu">

                <div onclick="setLang('ru')">Русский</div>
                <div onclick="setLang('de')">Deutsch</div>

            </div>

        </div>

    </div>

    <div class="form">

        <div class="input-group">
            <label id="labelUser"></label>
            <input type="text" id="username">
        </div>

        <div class="input-group">
            <label id="labelContact"></label>
            <input type="text" id="contact">
        </div>

        <div class="input-group">
            <label id="labelProblem"></label>
            <textarea id="problem"></textarea>
        </div>

        <button class="primary" onclick="createTicket()" id="btnCreate"></button>

    </div>

    <div class="ticket" id="ticketBox">

        <h3 id="ticketTitle"></h3>
        <p id="ticketText"></p>
        <div id="ticketId"></div>

        <button class="close-btn" onclick="closeTicket()" id="btnClose"></button>

    </div>

</div>

<script>

const webhookURL = "YOUR_WEBHOOK_HERE";

let lang = "ru";
let currentTicketId = null;

const texts = {

ru:{
    lang:"Язык",
    title:"Техническая поддержка",
    subtitle:"Создайте обращение через форму",
    user:"Имя пользователя",
    contact:"Контакт (Discord / Telegram)",
    problem:"Описание проблемы",
    create:"Создать обращение",
    ticketCreated:"Обращение создано",
    ticketText:"Заявка отправлена в поддержку.",
    close:"Закрыть обращение",
    alert:"Заполните все поля",
    embedTitle:"📩 Новое обращение",
    embedUser:"Пользователь",
    embedContact:"Контакт",
    embedProblem:"Проблема",
    embedTicket:"Номер тикета",
    closedTitle:"❌ Обращение закрыто",
    closedText:"Пользователь закрыл обращение."
},

de:{
    lang:"Sprache",
    title:"Technischer Support",
    subtitle:"Erstellen Sie ein Ticket",
    user:"Benutzername",
    contact:"Kontakt",
    problem:"Problem",
    create:"Ticket erstellen",
    ticketCreated:"Ticket erstellt",
    ticketText:"Ihre Anfrage wurde gesendet.",
    close:"Ticket schließen",
    alert:"Bitte alle Felder ausfüllen",
    embedTitle:"📩 Neues Ticket",
    embedUser:"Benutzer",
    embedContact:"Kontakt",
    embedProblem:"Problem",
    embedTicket:"Ticketnummer",
    closedTitle:"❌ Ticket geschlossen",
    closedText:"Der Benutzer hat das Ticket geschlossen."
}
};

function toggleLangMenu(){
    const menu = document.getElementById("langMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setLang(l){
    lang = l;
    document.getElementById("langMenu").style.display = "none";
    applyLang();
}

function applyLang(){

    const t = texts[lang];

    document.getElementById("langLabel").innerText = t.lang;

    document.getElementById("title").innerText = t.title;
    document.getElementById("subtitle").innerText = t.subtitle;

    document.getElementById("labelUser").innerText = t.user;
    document.getElementById("labelContact").innerText = t.contact;
    document.getElementById("labelProblem").innerText = t.problem;

    document.getElementById("btnCreate").innerText = t.create;
    document.getElementById("btnClose").innerText = t.close;
}

applyLang();

async function createTicket(){

    const t = texts[lang];

    const username = document.getElementById("username").value;
    const contact = document.getElementById("contact").value;
    const problem = document.getElementById("problem").value;

    if(!username || !contact || !problem){
        alert(t.alert);
        return;
    }

    currentTicketId = Math.floor(Math.random()*90000)+10000;

    await fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[{
                title:t.embedTitle,
                color:5867768,
                fields:[
                    {name:t.embedTicket,value:"#"+currentTicketId},
                    {name:t.embedUser,value:username},
                    {name:t.embedContact,value:contact},
                    {name:t.embedProblem,value:problem}
                ],
                footer:{text:"Support System"},
                timestamp:new Date()
            }]
        })
    });

    document.getElementById("ticketBox").style.display = "block";
    document.getElementById("ticketTitle").innerText = t.ticketCreated;
    document.getElementById("ticketText").innerText = t.ticketText;
    document.getElementById("ticketId").innerText = t.embedTicket + ": #" + currentTicketId;
}

async function closeTicket(){

    const t = texts[lang];

    await fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[{
                title:t.closedTitle,
                description:t.closedText,
                color:15158332,
                fields:[
                    {name:t.embedTicket,value:"#"+currentTicketId}
                ],
                footer:{text:"Support System"},
                timestamp:new Date()
            }]
        })
    });

    document.getElementById("ticketBox").style.display = "none";
}

</script>

</body>
</html>

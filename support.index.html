<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Support System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e1f22;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:650px;
    background:#2b2d31;
    border-radius:14px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.header{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#5865F2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.subtitle{
    margin-top:5px;
    color:#b5bac1;
}

.form{
    margin-top:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#b5bac1;
    font-size:14px;
}

input,
textarea{
    width:100%;
    background:#1e1f22;
    border:1px solid #3f4147;
    border-radius:8px;
    padding:12px;
    color:white;
    font-size:14px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

.primary{
    width:100%;
    background:#5865F2;
    color:white;
}

.primary:hover{
    background:#4752c4;
}

.ticket{
    margin-top:25px;
    background:#313338;
    border-radius:10px;
    padding:20px;
    display:none;
    border-left:4px solid #5865F2;
}

.ticket h3{
    margin-bottom:10px;
}

.ticket-id{
    margin-top:12px;
    color:#949ba4;
}

.close-btn{
    margin-top:15px;
    width:100%;
    background:#da373c;
    color:white;
}

.close-btn:hover{
    background:#b52d31;
}

</style>
</head>

<body>

<div class="card">

    <div class="header">

        <div class="avatar">
            🎧
        </div>

        <div>

            <div class="title">
                Техническая поддержка
            </div>

            <div class="subtitle">
                Заполните форму для создания обращения
            </div>

        </div>

    </div>

    <div class="form">

        <div class="input-group">
            <label>Имя пользователя</label>

            <input
                type="text"
                id="username"
                placeholder="Введите имя">
        </div>

        <div class="input-group">
            <label>Контакт для связи (Discord / Telegram)</label>

            <input
                type="text"
                id="contact"
                placeholder="@username">
        </div>

        <div class="input-group">
            <label>Описание проблемы</label>

            <textarea
                id="problem"
                placeholder="Опишите проблему"></textarea>
        </div>

        <button
            class="primary"
            onclick="createTicket()">

            Создать обращение

        </button>

    </div>

    <div class="ticket" id="ticketBox">

        <h3>
            ✅ Обращение создано
        </h3>

        <p>
            Ваша заявка успешно отправлена тех.поддержке.
        </p>

        <div class="ticket-id" id="ticketId">
        </div>

        <button
            class="close-btn"
            onclick="closeTicket()">

            Закрыть обращение

        </button>

    </div>

</div>

<script>

const webhookURL =
"https://discord.com/api/webhooks/1503900719684784198/gb6_N8DrwRvCkBXmZpIBED2f3JlyTvdx9m34fRSSxrDOTxat8Mb8w2Py031Uej7_NJ9n";

let currentTicketId = null;

async function createTicket(){

    const username =
        document.getElementById("username").value;

    const contact =
        document.getElementById("contact").value;

    const problem =
        document.getElementById("problem").value;

    if(!username || !contact || !problem){
        alert("Заполните все поля");
        return;
    }

    currentTicketId =
        Math.floor(Math.random() * 90000) + 10000;

    await fetch(webhookURL,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[
                {
                    title:"📩 Новое обращение",
                    color:5867768,
                    fields:[
                        {
                            name:"🎫 Номер тикета",
                            value:"#"+currentTicketId
                        },
                        {
                            name:"👤 Пользователь",
                            value:username
                        },
                        {
                            name:"📞 Контакт",
                            value:contact
                        },
                        {
                            name:"📝 Проблема",
                            value:problem
                        }
                    ],
                    footer:{
                        text:"Discord Support System"
                    },
                    timestamp:new Date()
                }
            ]
        })
    });

    document.getElementById("ticketBox").style.display = "block";

    document.getElementById("ticketId").innerText =
        "Номер обращения: #" + currentTicketId;
}

async function closeTicket(){

    await fetch(webhookURL,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:"Support Bot",
            embeds:[
                {
                    title:"❌ Обращение закрыто",
                    description:"Пользователь закрыл обращение.",
                    color:15158332,
                    fields:[
                        {
                            name:"🎫 Номер тикета",
                            value:"#"+currentTicketId
                        }
                    ],
                    footer:{
                        text:"Discord Support System"
                    },
                    timestamp:new Date()
                }
            ]
        })
    });

    document.getElementById("ticketBox").style.display = "none";
}

</script>

</body>
</html>
